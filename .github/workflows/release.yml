name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write      # cosign keyless + build provenance (OIDC)
  attestations: write  # GitHub build provenance attestation

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: sigstore/cosign-installer@v3        # cosign for keyless signing
      - uses: anchore/sbom-action/download-syft@v0 # syft for SBOM generation
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "v2.4.4"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*.tar.gz,dist/*.zip,dist/checksums.txt"
