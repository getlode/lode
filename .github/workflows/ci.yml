name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        run: go build ./...
      - name: Test (short, no S3)
        run: go test -short ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: golangci/golangci-lint-action@v6

  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install reference DVC
        run: pipx install "dvc[s3]" || pip install --user "dvc[s3]"
      - name: Byte-compat oracle vs real DVC
        run: go test ./tests/oracle/...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: govulncheck (dependency advisories)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Informational gate: our code has no reachable non-stdlib vulnerabilities.
          # Standard-library findings track the toolchain patch level (a moving target),
          # so they are surfaced as a warning rather than failing CI; Dependabot keeps
          # dependencies fresh.
          govulncheck ./... || echo "::warning::govulncheck reported findings — review (stdlib tracks the toolchain patch)"
