name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Build
        run: go build ./...
      - name: Test (short, no S3)
        run: go test -short ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Install reference DVC
        run: pipx install "dvc[s3]" || pip install --user "dvc[s3]"
      - name: Byte-compat oracle vs real DVC
        run: go test ./tests/oracle/...

  integration-minio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Install reference DVC
        run: pipx install "dvc[s3]" || pip install --user "dvc[s3]"
      - name: Start MinIO
        run: |
          docker run -d --name lode-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs lode-minio
          exit 1
      - name: Full integration suite with MinIO and DVC
        env:
          MINIO_ENDPOINT: http://127.0.0.1:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          go build -o ./lode ./cmd/lode
          export LODE_BIN="$PWD/lode"
          export DVC_BIN="$(command -v dvc)"
          test -n "$DVC_BIN"
          go test ./tests/integration/...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: govulncheck (hard-fail on reachable non-stdlib vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Reachable findings in our own code or dependencies fail the build.
          # Standard-library findings track the toolchain patch level (a moving
          # target), so they are surfaced as a warning, not a gate failure.
          govulncheck -format json ./... > govuln.json || true
          NONSTDLIB=$(jq -s '[.[]|.finding|select(.!=null)|select((.trace|length)>1)|select(.trace[0].module!="stdlib")]|length' govuln.json)
          STDLIB=$(jq -s '[.[]|.finding|select(.!=null)|select((.trace|length)>1)|select(.trace[0].module=="stdlib")]|length' govuln.json)
          echo "reachable vulnerabilities — non-stdlib: $NONSTDLIB, stdlib: $STDLIB"
          if [ "$STDLIB" -gt 0 ]; then echo "::warning::$STDLIB reachable stdlib vulnerabilities (bump the Go toolchain patch to clear)"; fi
          if [ "$NONSTDLIB" -gt 0 ]; then
            echo "::error::$NONSTDLIB reachable vulnerabilities in project/dependency code:"
            jq -rs '[.[]|.finding|select(.!=null)|select((.trace|length)>1)|select(.trace[0].module!="stdlib")|.osv]|unique[]' govuln.json
            exit 1
          fi
