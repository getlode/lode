version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  # `misspell` stays disabled: it flags Spanish in code COMMENTS too, but this
  # feature scopes English to user-facing OUTPUT only. That requirement is gated
  # by tests/integration/english_cli_test.go (the output sweep). Comments may be
  # migrated to English separately.

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
