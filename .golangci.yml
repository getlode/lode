run:
  timeout: 5m

linters:
  enable:
    - gofumpt
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  # Note: `misspell` is intentionally disabled — user-facing strings and comments
  # are currently in Spanish, which an English-only spell checker flags as typos.
  # Revisit if/when the CLI output is migrated to English.

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
