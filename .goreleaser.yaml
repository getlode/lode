version: 2

builds:
  - id: lode
    main: ./cmd/lode
    binary: lode
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# Homebrew publishing is deferred to a later release: it needs a PAT with
# write access to getlode/homebrew-tap (the default GITHUB_TOKEN cannot push
# cross-repo). Re-add a `brews:` block once HOMEBREW_TAP_TOKEN is configured.
