version: 2

builds:
  - id: lode
    main: ./cmd/lode
    binary: lode
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# Software Bill of Materials per archive (syft must be on PATH in CI).
sboms:
  - artifacts: archive

# Keyless signing of the checksums file with cosign (OIDC; needs id-token: write).
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

brews:
  - repository:
      owner: getlode
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/getlode/lode"
    description: "Fast, drop-in compatible reimplementation of DVC's data-versioning core, in Go"
    license: "MPL-2.0"
    test: |
      system "#{bin}/lode", "--version"
