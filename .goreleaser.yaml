version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: dvcgo
    main: ./cmd/dvcgo
    binary: dvcgo
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: jtorchia
      name: homebrew-tap
    homepage: "https://github.com/jtorchia/dvcgo"
    description: "Núcleo de versionado de datos en Go, drop-in compatible con DVC"
    license: "Apache-2.0"
