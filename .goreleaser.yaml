version: 2

builds:
  - id: lode
    main: ./cmd/lode
    binary: lode
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: getlode
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/getlode/lode"
    description: "Fast, drop-in compatible reimplementation of DVC's data-versioning core, in Go"
    license: "AGPL-3.0"
    test: |
      system "#{bin}/lode", "--version"
